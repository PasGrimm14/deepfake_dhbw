name: Build & Deploy to Portainer

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Job 1: Build & Push Docker Image ───────────────────────
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # latest auf main-Branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Commit-SHA als zusätzlicher Tag (für Rollbacks)
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-Args: VITE_* Variablen aus GitHub Secrets einbetten
          build-args: |
            VITE_ANTHROPIC_API_KEY=${{ secrets.VITE_ANTHROPIC_API_KEY }}
            VITE_NOTION_TOKEN=${{ secrets.VITE_NOTION_TOKEN }}
            VITE_NOTION_DATABASE_ID=${{ secrets.VITE_NOTION_DATABASE_ID }}
          # Cache für schnellere Builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy via Portainer Webhook ────────────────────
  deploy:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Trigger Portainer Stack Update
        run: |
          echo "Triggering Portainer webhook to pull latest image..."
          HTTP_STATUS=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30 \
            -X POST \
            "${{ secrets.PORTAINER_WEBHOOK_URL }}")

          echo "Portainer responded with HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 204 ]; then
            echo "❌ Portainer webhook failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Portainer deployment triggered successfully"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment erfolgreich" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY