[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Notion-Proxy: /api/notion-proxy → netlify function
[[redirects]]
  from   = "/api/notion-proxy"
  to     = "/.netlify/functions/notion-proxy"
  status = 200

# SPA-Fallback: alle anderen Routen → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200