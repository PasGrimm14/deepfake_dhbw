services:
  deepfake-awareness:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPO_NAME}:latest
    ports:
      - 3001:80
    container_name: deepfake-awareness
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - SCANNER_API_URL=https://deepfake-back.pasgri-cloud.de
    networks:
      - default
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/favicon.svg"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  notion-proxy:
    build:
      context: ./notion-proxy
      dockerfile: Dockerfile
    container_name: notion-proxy
    restart: unless-stopped
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - PORT=3002

  deepfake-backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPO_NAME}-backend:latest
    ports:
      - 3003:8000
    container_name: deepfake-backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - IMAGE_MODEL_PATH=models/deepfake_image.onnx
      - VIDEO_FRAMES=10
    networks:
      - default
      - proxy-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  proxy-network:
    name: proxy-network
    external: true