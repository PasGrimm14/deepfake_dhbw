services:
  deepfake-awareness:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPO_NAME}:latest
    ports:
      - 3001:80
    container_name: deepfake-awareness
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
    networks:
      - default
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/favicon.svg"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  notion-proxy:
    build:
      context: ./notion-proxy
      dockerfile: Dockerfile
    container_name: notion-proxy
    restart: unless-stopped
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - PORT=3002
    networks:
      - default
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  proxy-network:
    name: proxy-network
    external: true