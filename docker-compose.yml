services:
  deepfake-awareness:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPO_NAME}:latest
    # Alternativ lokal bauen (ohne CI/CD):
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    #   args:
    #     VITE_ANTHROPIC_API_KEY: ${VITE_ANTHROPIC_API_KEY:-}
    #     VITE_NOTION_TOKEN: ${VITE_NOTION_TOKEN:-}
    #     VITE_NOTION_DATABASE_ID: ${VITE_NOTION_DATABASE_ID:-}
    ports: 
      - 3001:3001
    container_name: deepfake-awareness
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
    networks:
      - default
      - proxy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # labels:
      # Optionale Traefik-Labels – auskommentieren falls kein Traefik genutzt wird
      # - "traefik.enable=true"
      # - "traefik.http.routers.deepfake.rule=Host(`deepfake.deine-domain.de`)"
      # - "traefik.http.routers.deepfake.entrypoints=websecure"
      # - "traefik.http.routers.deepfake.tls.certresolver=letsencrypt"
networks:
  proxy-network:
    name: proxy-network  # WICHTIG: Hier muss der exakte Name des Nginx-Netzwerks stehen (z.B. npm_default)
    external: true
